version: '3.8'

services:
  backend:
    build:
      context: ./HzmBackendVeriTabani
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./HzmBackendVeriTabani:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=veritabani
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/veritabani
    depends_on:
      - db

  frontend:
    build:
      context: ./HzmFrontendVeriTabani
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./HzmFrontendVeriTabani:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3000
      - VITE_API_KEY=vt_test123demo456789
    depends_on:
      - backend

  db:
    image: postgres:latest
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=veritabani
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: 